services:
  app:
    build: .
    image: video-compression-agent:latest
    container_name: video-compression-agent
    ports:
      # Host port overridable via VCA_HOST_PORT (docker-up.sh --port).
      - "${VCA_HOST_PORT:-8000}:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    # Reasonable shm size — ffmpeg + libvmaf can consume a chunk on long files
    shm_size: 1gb
