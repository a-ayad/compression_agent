# Overlay file: builds the Av1an-enabled image (Dockerfile.av1an) and tags
# it with an :av1an suffix so it doesn't clobber the slim base image.
#
# Use alone for a CPU-only Av1an deployment:
#   docker compose -f docker-compose.yml -f docker-compose.av1an.yml up --build
#
# Combine with the GPU overlay if you also want NVENC:
#   docker compose -f docker-compose.yml \
#                  -f docker-compose.av1an.yml \
#                  -f docker-compose.gpu.yml up --build

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.av1an
    image: video-compression-agent:av1an
    container_name: video-compression-agent-av1an
    # !override replaces the base file's ports list instead of appending to
    # it — without this, compose tries to bind 8000:8000 too and fails when
    # the slim base image is already running. Host port is parameterised
    # via VCA_HOST_PORT (default 8010) so docker-up.sh --port can swap it.
    ports: !override
      - "${VCA_HOST_PORT:-8010}:8000"
