# Overlay file: enables NVENC by giving the container access to the host's
# NVIDIA GPU. Requires the NVIDIA Container Toolkit installed on the host
# (https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/).
#
# Run with both files:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up

services:
  app:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, video, compute, utility]
